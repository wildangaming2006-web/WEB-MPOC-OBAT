<!DOCTYPE html>
<html lang="id">
<head>

<link rel="stylesheet" href="style.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data RME</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#1e88e5;
margin-bottom:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.search-box{
flex:1;
}

.search-box input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.hapus-semua{
background:#ff9800;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.hapus-semua:hover{
background:#ef6c00;
}

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1e88e5;
color:white;
padding:12px;
text-align:center;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f5f5f5;
}

.hapus-btn{
background:#e53935;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.kembali{
margin-top:20px;
text-align:center;
}

.kembali button{
background:#1e88e5;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

.empty{
padding:20px;
text-align:center;
color:#777;
}

</style>

</head>
<body>

<div class="container">

<h2>Rekam Medis Elektronik (RME)</h2>

<div class="top-bar">

<div class="search-box">
<input 
type="text" 
placeholder="Cari pasien..." 
id="searchInput"
onkeyup="cariPasien()"
>
</div>

<button class="hapus-semua" onclick="hapusSemua()">
Hapus Semua
</button>

</div>

<div class="table-container">
<table>

<thead>
<tr>
<th>No</th>
<th>Nama Pasien</th>
<th>Obat</th>
<th>Dosis</th>
<th>Rute</th>
<th>Waktu</th>
<th>Status</th>
<th>Tanggal</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabelRME"></tbody>

</table>
</div>

<div class="kembali">
<button onclick="window.location.href='pasien.html'">
Kembali ke Pasien
</button>
</div>

</div>

<script>

// ===========================
// AMBIL DATA
// ===========================
let dataRME = JSON.parse(localStorage.getItem("dataRME")) || [];

// ===========================
// TAMPILKAN DATA
// ===========================
function tampilkanData(data = dataRME){

let tabel = document.getElementById("tabelRME");
tabel.innerHTML = "";

if(data.length === 0){
tabel.innerHTML = `
<tr>
<td colspan="9" class="empty">
Belum ada data RME
</td>
</tr>
`;
return;
}

data.forEach((item,index)=>{

tabel.innerHTML += `
<tr>
<td>${index+1}</td>
<td>${item.nama}</td>
<td>${item.obat}</td>
<td>${item.dosis}</td>
<td>${item.rute || "-"}</td>
<td>${item.waktu}</td>
<td>${item.status || "Validasi Berhasil"}</td>
<td>${item.tanggal}</td>

<td>
<button 
class="hapus-btn"
onclick="hapusData(${index})"
>
Hapus
</button>
</td>

</tr>
`;

});

}


// ===========================
// CARI PASIEN
// ===========================
function cariPasien(){

let keyword = document
.getElementById("searchInput")
.value
.toLowerCase();

let hasil = dataRME.filter(item =>
item.nama.toLowerCase().includes(keyword)
);

tampilkanData(hasil);

}


// ===========================
// HAPUS DATA
// ===========================
function hapusData(index){

if(confirm("Hapus data pasien ini?")){

dataRME.splice(index,1);

localStorage.setItem(
"dataRME",
JSON.stringify(dataRME)
);

tampilkanData();

}

}


// ===========================
// HAPUS SEMUA
// ===========================
function hapusSemua(){

if(confirm("Hapus semua data RME?")){

localStorage.removeItem("dataRME");

dataRME = [];

tampilkanData();

}

}


// ===========================
// LOAD DATA
// ===========================
tampilkanData();

</script>

</body>
</html>
